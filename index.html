<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="کاتالوگ آنلاین هیمانگ؛ استیکر، لوازم ژورنال و محصولات دوست‌داشتنی."
  >

  <title>هیمانگ | استیکر و لوازم ژورنال</title>

  <style>
    :root {
      --background: #faf8f5;
      --surface: #ffffff;
      --surface-soft: #f6f1ed;

      --text: #4f4038;
      --text-light: #88756a;

      --pink: #edb4c1;
      --pink-dark: #d9859b;

      --green: #c8dcae;
      --yellow: #f3df8b;
      --lavender: #ddd4eb;

      --border: #ebe3dd;

      --shadow:
        0 18px 50px rgba(78, 58, 48, 0.09);

      --radius-large: 30px;
      --radius-medium: 20px;
      --radius-small: 13px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: Tahoma, Arial, sans-serif;
      line-height: 1.8;
    }

    img {
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      width: min(1180px, calc(100% - 40px));
      margin: auto;
    }

    /* Announcement */

    .announcement {
      background: var(--text);
      color: white;
      text-align: center;
      padding: 9px 15px;
      font-size: 13px;
      letter-spacing: 0.2px;
    }

    /* Navigation */

    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 248, 245, 0.94);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(235, 227, 221, 0.8);
    }

    .navbar {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      text-decoration: none;
      overflow: hidden;
      width: 175px;
      height: 62px;
      flex-shrink: 0;
    }

    .brand img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.22);
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      color: var(--text-light);
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--pink-dark);
    }

    .nav-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--text);
      color: white;
      text-decoration: none;
      padding: 11px 19px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
      transition:
        transform 0.2s ease,
        background 0.2s ease;
    }

    .nav-order:hover {
      background: var(--pink-dark);
      transform: translateY(-2px);
    }

    /* Hero */

    .hero {
      padding: 75px 0 95px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 0.95fr;
      align-items: center;
      gap: 75px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      color: var(--pink-dark);
      font-size: 14px;
      font-weight: bold;
    }

    .hero h1 {
      max-width: 620px;
      margin: 0 0 22px;
      font-size: clamp(38px, 5.3vw, 67px);
      line-height: 1.35;
      letter-spacing: -1px;
    }

    .hero-description {
      max-width: 580px;
      margin: 0 0 32px;
      color: var(--text-light);
      font-size: 17px;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 13px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 49px;
      padding: 0 23px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .button:hover {
      transform: translateY(-3px);
    }

    .button-primary {
      background: var(--pink);
      color: white;
      box-shadow: 0 10px 25px rgba(217, 133, 155, 0.25);
    }

    .button-primary:hover {
      background: var(--pink-dark);
    }

    .button-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .button-secondary:hover {
      background: white;
      box-shadow: var(--shadow);
    }

    .hero-art {
      position: relative;
      background: var(--surface);
      border-radius: 42px;
      overflow: hidden;
      box-shadow: var(--shadow);
      aspect-ratio: 1 / 1;
    }

    .hero-art img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      transform: scale(1.12);
    }

    .hero-note {
      position: absolute;
      left: 25px;
      bottom: 25px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: 0 8px 25px rgba(70, 50, 40, 0.1);
    }

    /* Shared section */

    .section {
      padding: 90px 0;
    }

    .section-soft {
      background: var(--surface-soft);
    }

    .section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 25px;
      margin-bottom: 38px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 43px);
      line-height: 1.4;
    }

    .section-heading p {
      max-width: 490px;
      margin: 8px 0 0;
      color: var(--text-light);
    }

    /* Categories */

    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .category-card {
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 25px;
      border-radius: var(--radius-medium);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .category-card:hover {
      transform: translateY(-7px);
      box-shadow: var(--shadow);
    }

    .category-icon {
      font-size: 35px;
    }

    .category-card h3 {
      margin: 0 0 5px;
      font-size: 19px;
    }

    .category-card p {
      margin: 0;
      color: rgba(79, 64, 56, 0.7);
      font-size: 13px;
    }

    .category-pink {
      background: #f8dce3;
    }

    .category-green {
      background: #e1edd3;
    }

    .category-yellow {
      background: #f8edbd;
    }

    .category-lavender {
      background: #e9e2f3;
    }

    /* Featured product */

    .showcase-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(280px, 0.8fr);
      gap: 25px;
      align-items: stretch;
    }

    .product-card {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      background: var(--surface);
      border-radius: var(--radius-large);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .product-image {
      position: relative;
      min-height: 530px;
      overflow: hidden;
      background: #eee8e2;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .product-card:hover .product-image img {
      transform: scale(1.035);
    }

    .stock-badge {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.92);
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 12px;
      box-shadow: 0 8px 25px rgba(70, 50, 40, 0.1);
    }

    .product-details {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 42px;
    }

    .product-category {
      margin: 0 0 10px;
      color: var(--pink-dark);
      font-size: 13px;
      font-weight: bold;
    }

    .product-details h3 {
      margin: 0 0 17px;
      font-size: clamp(27px, 3vw, 39px);
      line-height: 1.45;
    }

    .product-description {
      margin: 0 0 22px;
      color: var(--text-light);
    }

    .product-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 25px;
    }
